{% extends "template.jinja" %}

{% block title %}Diagnóstico — Relatório Financeiro{% endblock %}

{% block content %}
<div class="accent-bar"></div>
<header>
    <h1>Diagnóstico</h1>
</header>
<main>
    <style>
        .diagnostico h2 { font-size: 13pt; font-weight: 700; color: #0984e3; margin: 0 0 4px 0; border-bottom: 1px solid #dfe6e9; padding-bottom: 3px; }
        .diagnostico h3 { font-size: 11pt; font-weight: 700; color: #2d3436; margin: 8px 0 3px 0; }
        .diagnostico h4 { font-size: 10pt; font-weight: 700; color: #636e72; margin: 6px 0 2px 0; }
        .diagnostico p  { margin: 4px 0; }
        .diagnostico ul { margin: 4px 0; padding-left: 18px; }
        .diagnostico li { margin-bottom: 4px; }
    </style>
    <div class="diagnostico" style="background: #f5f6fa; border-radius: 8px; padding: 18px 22px; font-size: 10pt; line-height: 1.7; overflow: hidden;">
        {{ diagnostico_html | safe }}
    </div>
</main>
{% endblock %}
